<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Yield Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f9f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            width: 350px;
        }

        h2 {
            text-align: center;
            color: green;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: darkgreen;
        }

        #result {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: blue;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Crop Yield Prediction</h2>

    <label>Crop Name</label>
    <select id="crop">
        <option>Rice</option>
        <option>Wheat</option>
        <option>Maize</option>
        <option>Cotton</option>
    </select>

    <label>Rainfall (mm)</label>
    <input type="number" id="rainfall" placeholder="Enter rainfall">

    <label>Temperature (°C)</label>
    <input type="number" id="temperature" placeholder="Enter temperature">

    <label>Soil pH</label>
    <input type="number" id="ph" step="0.1" placeholder="Enter soil pH">

    <button onclick="predictYield()">Predict Yield</button>

    <p id="result"></p>
</div>


</body>
</html>
